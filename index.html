<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성격 테스트</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
  /* 좌 흰색 / 우 검정색 (그라데이션 제거) */
  background: linear-gradient(to right, white 50%, black 50%);
}
.container {
  max-width: 400px;
  margin: auto;
}
.btn-wrap { display: flex; gap: 10px; }
button { flex: 1; padding: 14px; font-size: 16px; border-radius: 10px; }
#choice1 { background: black; color: white; border: none; }
#choice2 { background: white; color: black; border: 2px solid black; }
</style>
</head>
<body>
<div class="container">
  <h2 id="question"></h2>
  <div class="btn-wrap">
    <button id="choice1"></button>
    <button id="choice2"></button>
  </div>
</div>

<script>
const questions = [
  { q: "낯선 사람이 말을 걸면?", a: "무시한다", b: "대화 이어간다" },
  { q: "모임에서 나는?", a: "듣는 편", b: "말하는 편" },
  { q: "계획 없는 하루가 생기면?", a: "그냥 보낸다", b: "계획을 세운다" },
  { q: "새로운 일이 시작하면?", a: "생각 후 시작한다", b: "일단 시작한다" },
  { q: "갈등이 발생하면?", a: "피한다", b: "해결을 시도한다" },
  { q: "혼자만 있는 시간이 생기면?", a: "좋다", b: "심심하다" },
  { q: "결정 방식은?", a: "논리적이다", b: "감정을 담아서 결정한다" },
  { q: "약속이 취소되면?", a: "좋다", b: "아쉽다" },
  { q: "새 환경이 되면?", a: "적응이 느리다", b: "적응이 빠르다" },
  { q: "일 처리할때 방식은?", a: "완벽", b: "속도" }
];

let index = 0;
let score = 0;

const qEl = document.getElementById("question");
const c1 = document.getElementById("choice1");
const c2 = document.getElementById("choice2");

function loadQuestion() {
  const current = questions[index];
  qEl.textContent = current.q;
  c1.textContent = current.a;
  c2.textContent = current.b;
}

c1.onclick = () => {
  index++;
  next();
};

c2.onclick = () => {
  score += 1;
  index++;
  next();
};

function next() {
  if (index < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.body.innerHTML = `
    <div class="container">
      <h2>결과</h2>
      <p style="white-space: pre-line;">${getResult()}</p>
      <button onclick="location.reload()">다시하기</button>
    </div>
  `;
}

function getResult() {
  if (score <= 3) return "🍵 차분한 고양이\n조용하고 신중한 성격";
  if (score <= 7) return "🍎 균형 잡힌 사과\n상황에 따라 유연한 성격";
  return "🔥 에너지 폭발 불꽃\n활발하고 외향적인 성격";
}

loadQuestion();
</script>
</body>
</html>
